<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طريقك إلى الهداية</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display&display=swap" rel="stylesheet">
<style>
body {
    margin:0; padding:0;
    font-family: 'SF Pro Display', sans-serif;
    background: #000;
    color:#fff; text-align:center;
}
.logo-container {
    margin-top:50px;
    width:180px; height:180px;
    margin-left:auto; margin-right:auto;
    border-radius:50%; overflow:hidden;
    border:4px solid #ffd700;
    box-shadow:0 0 20px #ffd70050;
}
.logo-container img { width:100%; height:100%; object-fit:cover; }
h1 { font-size:36px; color:#ffd700; margin:20px; text-shadow:2px 2px #000; }
p { font-size:18px; color:#ccc; margin:10px auto 40px auto; max-width:600px; line-height:1.5; }
.buttons { display:flex; justify-content:center; gap:50px; margin-bottom:40px; }
.btn { padding:20px 50px; font-size:22px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; transition:0.3s; }
.btn-muslim { background-color:#28a745; color:white; }
.btn-muslim:hover { background-color:#218838; transform:scale(1.05); }
.btn-christian { background-color:#007bff; color:white; }
.btn-christian:hover { background-color:#0056b3; transform:scale(1.05); }
</style>
</head>
<body>

<div class="logo-container">
    <img src="file_00000000a4c0720a83a8ee85c7de128a.png" alt="طريقك إلى الهداية">
</div>

<h1>مرحبًا بك في موقع طريقك إلى الهداية</h1>
<p>اختر دينك لتبدأ رحلتك الفكرية والعقائدية.</p>

<div class="buttons">
    <button class="btn btn-muslim" onclick="goToPage('muslim')">مسلم ©</button>
    <button class="btn btn-christian" onclick="goToPage('christian')">مسيحي ®</button>
</div>

<script>
function goToPage(religion){
    localStorage.setItem('religion', religion); // حفظ اختيار الدين
    window.location.href = 'questions.html';
}
</script>

</body>
</html>
