<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طريقك إلى الهداية</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display&display=swap" rel="stylesheet">
<style>
body {margin:0; padding:0; font-family:'SF Pro Display', sans-serif; background:#000; color:#fff; text-align:center;}
.logo-container {margin:30px auto; width:180px; height:180px; border-radius:50%; overflow:hidden; border:4px solid #ffd700; box-shadow:0 0 20px #ffd70050;}
.logo-container img {width:100%; height:100%; object-fit:cover;}
h1 { font-size:24px; color:#ffd700; margin:15px; text-shadow:1px 1px #000; }
p { font-size:14px; color:#ccc; margin:10px auto 30px auto; max-width:600px; line-height:1.4; }
.buttons { display:flex; justify-content:center; gap:30px; margin-bottom:30px; }
.btn { padding:12px 30px; font-size:16px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; transition:0.3s; }
.btn-muslim { background-color:#28a745; color:white; }
.btn-muslim:hover { background-color:#218838; transform:scale(1.05); }
.btn-christian { background-color:#007bff; color:white; }
.btn-christian:hover { background-color:#0056b3; transform:scale(1.05); }
</style>
</head>
<body>

<div class="logo-container">
    <img src="file_00000000a4c0720a83a8ee85c7de128a.png" alt="طريقك إلى الهداية">
</div>

<h1>مرحبًا بك في موقع طريقك إلى الهداية</h1>
<p>اختر دينك للبدء بالأسئلة والإجابات</p>

<div class="buttons">
    <button class="btn btn-muslim" onclick="chooseReligion('muslim')">مسلم ©</button>
    <button class="btn btn-christian" onclick="chooseReligion('christian')">مسيحي ®</button>
</div>

<script>
function speak(text){
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = 'ar-SA';
    msg.rate = 1;
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
}
function chooseReligion(rel){
    if(rel==='muslim') speak('مرحبًا يا أخي المسلم، الهدف: الدعوة في الدين والتمسك بالعقيدة الصحيحة');
    else speak('مرحبًا يا أخي المسيحي، الهدف: التوعية والتفكير في العقيدة الإسلامية بشكل علمي');
    localStorage.setItem('religion', rel);
    window.location.href='questions.html';
}
</script>

</body>
</html>
