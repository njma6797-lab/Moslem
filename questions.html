<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأسئلة والإجابات</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display&display=swap" rel="stylesheet">
<style>
body {margin:0; padding:0; font-family:'SF Pro Display', sans-serif; background:#000; color:#fff; text-align:center;}
h1 {font-size:24px; color:#ffd700; margin:15px;}
.question-card {background:#222; margin:15px auto; padding:15px; border-radius:12px; max-width:800px; text-align:right;}
.question-card h2 {color:#ffd700; font-size:16px;}
.answer {background:#333; padding:12px; border-radius:8px; font-size:14px; line-height:1.5; color:#fff; text-align:right; margin-bottom:8px;}
.answer .highlight {color:#ffff00; font-weight:bold; background:#333; padding:0 3px; border-radius:3px;}
.add-answer {margin:20px auto; max-width:800px; text-align:right;}
.add-answer textarea {width:100%; height:70px; border-radius:8px; padding:8px; font-size:14px;}
.add-answer button {padding:8px 18px; margin-top:10px; font-size:14px; border:none; border-radius:8px; cursor:pointer; background:#28a745; color:#fff; transition:0.3s;}
.add-answer button:hover { background:#218838; transform:scale(1.05);}
</style>
</head>
<body>

<h1>الأسئلة والإجابات</h1>
<div id="questions-container"></div>

<div class="add-answer">
    <h2>أضف إجابتك الخاصة:</h2>
    <textarea id="newAnswer" placeholder="اكتب إجابتك هنا..."></textarea>
    <button onclick="addAnswer()">إضافة الإجابة</button>
</div>

<script>
let religion = localStorage.getItem('religion') || 'muslim';

function loadQuestions(){
    fetch('islam_faith_questions.json')
    .then(res=>res.json())
    .then(data=>{
        const container=document.getElementById('questions-container');
        container.innerHTML='';
        data.forEach(q=>{
            const card=document.createElement('div');
            card.classList.add('question-card');
            const ansText = religion==='muslim'? q.answer_muslim : q.answer_christian;
            card.innerHTML = `<h2>سؤال: ${q.question}</h2><div class="answer">${ansText}</div>`;
            container.appendChild(card);
        });
    });
}
loadQuestions();

function addAnswer(){
    const text=document.getElementById('newAnswer').value;
    if(text.trim()==='') return alert('اكتب الإجابة أولاً!');
    const container=document.getElementById('questions-container');
    const newDiv=document.createElement('div');
    newDiv.classList.add('answer');
    newDiv.innerHTML=`<p>${text}</p>`;
    container.appendChild(newDiv);
    document.getElementById('newAnswer').value='';
}
</script>

</body>
</html>
