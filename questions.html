<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأسئلة والإجابات</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display&display=swap" rel="stylesheet">
<style>
body { font-family: 'SF Pro Display', sans-serif; background:#111; color:#fff; text-align:center; margin:0; }
h1 { color:#ffd700; margin:20px; text-shadow:1px 1px #000; }
.question-card { background:#222; margin:20px auto; padding:20px; border-radius:12px; max-width:800px; text-align:right;
transition:0.3s; }
.question-card:hover { transform:scale(1.02); box-shadow:0 0 20px rgba(255,255,255,0.3); }
.question-card h2 { color:#ffd700; }
.answer { background:#333; padding:15px; margin-top:10px; border-radius:8px; font-size:18px; line-height:1.5; }
</style>
</head>
<body>

<h1>الأسئلة والإجابات</h1>
<div id="questions-container"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const din = urlParams.get('din');

fetch('questions.json')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('questions-container');
    data.forEach(q => {
        const card = document.createElement('div');
        card.classList.add('question-card');
        card.innerHTML = `<h2>سؤال: ${q.question}</h2>`;
        let answerText = '';
        if(din === 'muslim') answerText = q.answer_quran;
        else if(din === 'christian') answerText = q.answer_quran + ' (الإجابة من القرآن)';
        card.innerHTML += `<div class="answer"><p>${answerText}</p></div>`;
        container.appendChild(card);
    });
});
</script>

</body>
</html>
